<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Adicionar Aluno</title>
  <link rel="stylesheet" href="AdicionarAlunoPage.css">
</head>
<body>

<div class="card">

  <div class="profile">
    <img src="https://i.pravatar.cc/100" alt="perfil">
  </div>

  <div class="form">

    <div class="row">
      <div class="input-group">
        <div class="group">
          <input class="input" type="text" placeholder="First Name">
        </div>
      </div>

      <div class="input-group">
        <div class="group">
          <input class="input" type="text" placeholder="Last Name">
        </div>
      </div>
    </div>

    <div class="row">
      <div class="input-group">
        <div class="group">
          <input class="input" type="email" placeholder="Email">
        </div>
      </div>

      <div class="input-group">
        <div class="group">
          <input class="input" type="text" placeholder="Phone Number">
        </div>
      </div>
    </div>

    <div class="row">
      <div class="input-group">
        <div class="group">
          <input class="input" type="text" placeholder="Date of Birth">
        </div>
      </div>

      <div class="input-group">
        <div class="group">
          <input class="input" type="text" placeholder="Country">
        </div>
      </div>
    </div>

    <div class="input-group">
      <div class="group">
        <input class="input" type="text" placeholder="Class">
      </div>
    </div>

    <div class="input-group">
      <textarea placeholder="Bio..."></textarea>
    </div>

  </div>

</div>

<button class="fab-add">+</button>

</body>
</html>
